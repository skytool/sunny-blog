services:
  - type: web
    name: sunny-blog
    runtime: ruby
    buildCommand: |
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails tailwindcss:build
      bundle exec rails db:migrate
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sunny-blog-db
          property: connectionString
      # Cloudflare R2 — fill these in Render dashboard
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false

databases:
  - name: sunny-blog-db
    databaseName: sunny_blog_production
    user: sunny_blog
